<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#06070f" />
<title>Echipa Lumina — Radu Photon (Feel Slice, in-engine)</title>
<link rel="manifest" href="./public/manifest.webmanifest" />
<style>
  :root{
    --void:#06070f; --gold:#ffd24a; --ink:#0c0a14;
    --panel:rgba(16,18,32,0.72); --panel-line:rgba(255,210,74,0.28);
    --txt:#eef1ff; --dim:#9aa0c8;
    --font: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; background:var(--void); overflow:hidden; font-family:var(--font); color:var(--txt); }
  #stage{ position:fixed; inset:0; }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* title */
  .titlewrap{ position:fixed; left:24px; top:20px; pointer-events:none; user-select:none; }
  .eyebrow{ font-size:11px; letter-spacing:.32em; text-transform:uppercase; color:var(--gold); font-weight:700; opacity:.9; }
  .title{ font-size:30px; font-weight:800; letter-spacing:.01em; margin-top:2px;
          text-shadow:0 2px 24px rgba(255,210,74,.35); }
  .sub{ font-size:13px; color:var(--dim); margin-top:4px; max-width:46ch; line-height:1.45; }

  /* control bar */
  .bar{ position:fixed; left:50%; bottom:20px; transform:translateX(-50%);
        display:flex; align-items:center; gap:8px; padding:10px;
        background:var(--panel); border:1px solid var(--panel-line); border-radius:18px;
        backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
        box-shadow:0 12px 50px rgba(0,0,0,.5); max-width:calc(100vw - 32px); flex-wrap:wrap; justify-content:center; }
  .btn{ appearance:none; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.05);
        color:var(--txt); font-family:var(--font); font-size:13px; font-weight:600; letter-spacing:.01em;
        padding:9px 13px; border-radius:11px; cursor:pointer; display:inline-flex; align-items:center; gap:7px;
        transition:background .15s, border-color .15s, transform .05s; white-space:nowrap; }
  .btn:hover{ background:rgba(255,255,255,.1); border-color:rgba(255,210,74,.4); }
  .btn:active{ transform:translateY(1px); }
  .btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .btn .dot{ width:8px; height:8px; border-radius:50%; background:var(--gold); box-shadow:0 0 10px var(--gold); }
  .btn.primary{ background:linear-gradient(90deg,#ffd24a,#ff9d54); color:#1a1000; border-color:transparent; }
  .btn.primary:hover{ filter:brightness(1.05); }
  .btn.on{ background:rgba(255,210,74,.18); border-color:var(--gold); color:#fff3c4; }
  .sep{ width:1px; height:26px; background:rgba(255,255,255,.12); margin:0 3px; }
  .dawn{ display:flex; align-items:center; gap:8px; padding:0 6px; color:var(--dim); font-size:12px; font-weight:600; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:120px; height:6px; border-radius:6px;
        background:linear-gradient(90deg,#16203c,#3a4f8a 45%,#ff9d54); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
        background:#fff7d6; border:2px solid #ffd24a; box-shadow:0 0 10px rgba(255,210,74,.7); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:16px; height:16px; border-radius:50%; background:#fff7d6; border:2px solid #ffd24a; cursor:pointer; }
  input[type=range]:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }
  .hint{ position:fixed; right:22px; bottom:84px; color:var(--dim); font-size:12px; text-align:right; opacity:.8; pointer-events:none; }
  @media (max-width:640px){ .title{font-size:23px;} .sub{display:none;} .hint{display:none;} }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>
<div class="titlewrap">
  <div class="eyebrow">Echipa Lumina · Feel Slice</div>
  <div class="title">Radu Photon</div>
  <div class="sub">In-engine port — layered light-figure, rim-light, streaming light-mantle, and authored animation. Try his moves; drag the dawn.</div>
</div>
<div class="hint">Keys · 1 Idle · 2 Walk · 3 Lightstep · 4 Energy Blast · A Aura</div>
<div class="bar" id="bar">
  <button class="btn" data-act="idle"><span class="dot"></span>Idle</button>
  <button class="btn" data-act="walk">Walk</button>
  <button class="btn primary" data-act="dash">⚡ Lightstep</button>
  <button class="btn primary" data-act="blast">✦ Energy Blast</button>
  <button class="btn" data-act="aura" id="auraBtn">◎ Photon Aura</button>
  <span class="sep"></span>
  <span class="dawn">Dawn <input id="dawn" type="range" min="0" max="100" value="42" aria-label="Dawn level"></span>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
