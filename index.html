<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Radu Photon — Frontline of Light</title>
<meta name="theme-color" content="#06070f" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" />

<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
  :root{ --void:#06070f; }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; background:var(--void); overflow:hidden; }
  body{ display:flex; align-items:center; justify-content:center;
        font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  #wrap{ position:relative; width:100vw; height:100vh; }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block;
          image-rendering:auto; touch-action:none; cursor:pointer; }
</style>
</head>
<body>
  <div id="wrap"><canvas id="c" width="1280" height="720"></canvas></div>
<script>
(() => {
"use strict";
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720, GROUND = 566;
const BASE_X = 116, CORE_X = 1176;
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);
    this.beginPath(); this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r);
    this.closePath(); return this; };
}

// ---------------------------------------------------------------- colors
function hx(h){ if(typeof h==='string' && h[0]==='#'){ h=h.slice(1); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; } const m=String(h).match(/\d+/g); return m?[+m[0],+m[1],+m[2]]:[0,0,0]; }
function mix(a,b,t){ const A=hx(a),B=hx(b); return `rgb(${A[0]+(B[0]-A[0])*t|0},${A[1]+(B[1]-A[1])*t|0},${A[2]+(B[2]-A[2])*t|0})`; }
function rgba(h,a){ const A=hx(h); return `rgba(${A[0]||0},${A[1]||0},${A[2]||0},${a})`; }

// ---------------------------------------------------------------- unit definitions
const LIGHT = {
  trooper:{ name:'Photon Trooper', cost:12, cd:0.9,  hp:42,  dmg:6,  range:236, atkCd:0.82, speed:56, proj:'bolt',  w:30, h:54, glow:'#5fe6ff' },
  manu:   { name:'Manu · Titan',   cost:40, cd:11,   hp:470, dmg:30, range:54,  atkCd:1.1,  speed:30, melee:true,  w:56, h:80, glow:'#ff8a3d', bulky:true },
  floris: { name:'Floris · Lore',  cost:30, cd:6.5,  hp:30,  dmg:34, range:540, atkCd:2.5,  speed:30, proj:'bomb', splash:80, w:30, h:56, glow:'#4fe0a0' },
  andreea:{ name:'Andreea · Mind',  cost:28, cd:8.5,  hp:82,  dmg:9,  range:226, atkCd:1.2,  speed:42, proj:'wave', slowR:140, slowF:0.55, w:30, h:58, glow:'#8fb0ff' },
  radu:   { name:'Radu Photon',    cost:50, cd:13,   hp:150, dmg:24, range:300, atkCd:0.5,  speed:98, proj:'beam', pierce:3, w:32, h:60, glow:'#ffd24a', hero:true },
  victor: { name:'Victor · Maker', cost:36, cd:12,   hp:240, dmg:13, range:300, atkCd:0.7,  speed:48, proj:'bolt', plant:true, w:34, h:60, glow:'#3fd6c8' },
  pissy:  { name:'Pissy · Blink',  cost:28, cd:12,   hp:74,  dmg:14, range:60,  atkCd:0.45, speed:90, melee:true, omni:true, blink:true, w:28, h:54, glow:'#ff6fd0' },
};
const DARK = {
  crawler:{ name:'Shade Crawler', hp:36,   dmg:7,  range:44,  atkCd:0.9,  speed:50, melee:true, w:30, h:50, glow:'#b266ff' },
  slinger:{ name:'Shade Slinger', hp:30,   dmg:7,  range:246, atkCd:1.15, speed:40, proj:'dbolt', w:28, h:54, glow:'#a64dff' },
  brute:  { name:'Dark Brute',    hp:360,  dmg:32, range:54,  atkCd:1.2,  speed:26, melee:true, w:58, h:82, glow:'#8a2be2', bulky:true },
  drone:  { name:'Null Drone',    hp:28,   dmg:5,  range:212, atkCd:1.0,  speed:78, proj:'dbolt', fly:64, w:34, h:30, glow:'#c77bff', drains:true },
  umbra:  { name:'UMBRA',         hp:1900, dmg:55, range:132, atkCd:1.8,  speed:18, melee:true, aoe:130, w:92, h:142, glow:'#7a1fd6', boss:true },
};
const CARD_ORDER = ['trooper','manu','victor','floris','andreea','radu','pissy'];
const SHORT = {trooper:'Trooper',manu:'Manu',victor:'Victor',floris:'Floris',andreea:'Andreea',radu:'Radu',pissy:'Pissy'};

// ---------------------------------------------------------------- state
let state='menu', t=0, last=performance.now();
let units=[], shots=[], parts=[], floats=[];
let energy=60, ENERGY_CAP=110, kills=0, frontX=W*0.5;
let base, core, cds={}, spawnTimer=2.0, bossOut=false, shake=0, hitstop=0, flash=0;
let muted=false;

function reset(){
  units=[]; shots=[]; parts=[]; floats=[];
  energy=60; kills=0; frontX=W*0.5; t=0;
  base={ hp:1100, max:1100 }; core={ hp:1300, max:1300 };
  cds={}; for(const k of CARD_ORDER) cds[k]=0;
  spawnTimer=1.8; bossOut=false; shake=0; hitstop=0; flash=0;
}

// ---------------------------------------------------------------- audio
let actx=null, mg=null;
function audio(){ if(actx){ if(actx.state==='suspended') actx.resume(); return; }
  try{ actx=new (window.AudioContext||window.webkitAudioContext)(); mg=actx.createGain(); mg.gain.value=muted?0:0.16; mg.connect(actx.destination);}catch(e){actx=null;} }
function beep(f,d,type='sine',to=null,peak=0.5){ if(!actx||muted) return;
  const ti=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();
  o.type=type; o.frequency.setValueAtTime(f,ti); if(to)o.frequency.exponentialRampToValueAtTime(to,ti+d);
  g.gain.setValueAtTime(0.0001,ti); g.gain.exponentialRampToValueAtTime(peak,ti+0.01); g.gain.exponentialRampToValueAtTime(0.0001,ti+d);
  o.connect(g); g.connect(mg); o.start(ti); o.stop(ti+d+0.02); }
function noise(d,peak=0.4,lp=900){ if(!actx||muted) return;
  const ti=actx.currentTime, n=Math.floor(actx.sampleRate*d), buf=actx.createBuffer(1,n,actx.sampleRate), dat=buf.getChannelData(0);
  for(let i=0;i<n;i++) dat[i]=(Math.random()*2-1)*(1-i/n);
  const s=actx.createBufferSource(); s.buffer=buf; const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp;
  const g=actx.createGain(); g.gain.value=peak; s.connect(f); f.connect(g); g.connect(mg); s.start(); }
const sDeploy=()=>{ beep(520,0.12,'sine',880,0.4); beep(780,0.1,'sine',1180,0.25); };
const sShot  =()=>beep(880,0.07,'square',520,0.18);
const sDShot =()=>beep(220,0.09,'sawtooth',120,0.18);
const sBoom  =()=>{ noise(0.4,0.5,700); beep(90,0.4,'sine',40,0.5); };
const sHit   =()=>noise(0.05,0.18,1600);
const sWin   =()=>[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'sine',null,0.4),i*130));
const sLose  =()=>[392,330,262,196].forEach((f,i)=>setTimeout(()=>beep(f,0.4,'sawtooth',null,0.35),i*160));

// ---------------------------------------------------------------- spawning
function blinkFx(x,y,c){ for(let i=0;i<22;i++){ const a=Math.random()*6.28, sp=60+Math.random()*170; parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,g:0,life:0,max:0.4,r:2+Math.random()*2,c,add:true}); } beep(900,0.12,'sine',1500,0.3); }
function spawnLight(type){
  const d=LIGHT[type];
  const u = makeUnit('light',type,d, BASE_X+34+Math.random()*8, GROUND - (d.fly||0) - Math.random()*6);
  if(d.plant){ u.plantX = 440 + Math.random()*120; u.planted=false; }
  if(d.blink){ blinkFx(u.x, GROUND-30, d.glow); u.x = CORE_X - 210 - Math.random()*120; blinkFx(u.x, GROUND-30, d.glow); }
  units.push(u);
}
function spawnDark(type){
  const d=DARK[type];
  units.push(makeUnit('dark',type,d, CORE_X-34-Math.random()*8, GROUND - (d.fly||0) - Math.random()*6));
}
function makeUnit(side,type,d,x,y){
  return { side,type,def:d, x,y, baseY:y, hp:d.hp, max:d.hp, w:d.w, h:d.h, glow:d.glow,
    fly:d.fly||0, atk:0, atkAnim:0, hitFlash:0, anim:Math.random()*6, dead:false, dt:0,
    moving:true, slowed:0, hitSet:null };
}
function darkPick(){
  const r=Math.random();
  if(t<22)      return r<0.7?'crawler':'slinger';
  if(t<55)      return r<0.42?'crawler':r<0.72?'slinger':r<0.87?'drone':'brute';
  if(t<105)     return r<0.30?'crawler':r<0.58?'slinger':r<0.82?'brute':'drone';
  return r<0.26?'crawler':r<0.50?'slinger':r<0.80?'brute':'drone';
}
function spawnInterval(){ return Math.max(0.85, 2.5 - t*0.011); }

// ---------------------------------------------------------------- combat helpers
function structHpFor(side){ return side==='light'? base : core; }
function structXFor(side){ return side==='light'? BASE_X : CORE_X; }
function ahead(u,e){ return u.side==='light' ? (e.x > u.x-6) : (e.x < u.x+6); }
function acquire(u){
  let best=null, bd=1e9; const omni=u.def.omni;
  for(const e of units){ if(e.dead||e.side===u.side) continue; if(!omni && !ahead(u,e)) continue;
    const dx=Math.abs(e.x-u.x); if(dx<bd){ bd=dx; best=e; } }
  return best;
}
function damageUnit(u,dmg,fromLight){
  u.hp-=dmg; u.hitFlash=0.85;
  if(u.hp<=0 && !u.dead){ u.dead=true; killUnit(u,fromLight); }
}
function killUnit(u,fromLight){
  // death particles
  const c = u.side==='light' ? u.glow : '#b266ff';
  for(let i=0;i<(reduce?8:18);i++){
    const a=Math.random()*6.28, sp=30+Math.random()*120;
    parts.push({ x:u.x, y:u.y-u.h*0.5, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - (u.side==='light'?60:-10),
      g: u.side==='light'? -40 : 90, life:0, max:0.5+Math.random()*0.5, r:2+Math.random()*3, c, add:u.side==='light' });
  }
  if(u.side==='dark'){ kills++; energy=Math.min(ENERGY_CAP, energy+ (u.def.boss?40:4));
    floats.push({ x:u.x, y:u.y-u.h-6, txt:'+'+(u.def.boss?40:4), c:'#ffe27a', life:0, max:0.9, vy:-26 }); }
  if(u.def.boss){ shake=22; hitstop=0.12; flash=0.6; sBoom(); }
  else if(u.def.bulky){ shake=Math.max(shake,7); }
}

// ---------------------------------------------------------------- shots
function fireShot(u,target){
  const d=u.def, fromLight=u.side==='light';
  const muzY = u.y - u.h*0.62, muzX = u.x + (fromLight?u.w*0.42:-u.w*0.42);
  // structure target -> instant damage + cosmetic shot
  const isStruct = target.struct;
  if(d.proj==='bomb'){
    const tx = isStruct? target.x : target.x;
    shots.push({ kind:'bomb', x:muzX, y:muzY, vx:(tx-muzX)/0.9, vy:-260, g:520, side:u.side, dmg:d.dmg, splash:d.splash, gx:tx, c:u.glow, life:0 });
    beep(360,0.12,'triangle',180,0.25);
    return;
  }
  if(isStruct){
    const s = u.side==='light'? core : base; s.hp-=d.dmg;
    if(u.side==='light'){ flash=Math.max(flash,0.04); }
    spawnShotVisual(u,muzX,muzY,structXFor(u.side==='light'?'dark':'light'), muzY-40, d, true);
    fromLight? sShot(): sDShot();
    return;
  }
  spawnShotVisual(u,muzX,muzY,target.x,target.y-target.h*0.55,d,false);
  fromLight? sShot(): sDShot();
  // light muzzle
  for(let i=0;i<4;i++){ const a=(fromLight?0:Math.PI)+(Math.random()-0.5)*0.6;
    parts.push({x:muzX,y:muzY,vx:Math.cos(a)*120,vy:Math.sin(a)*120,g:0,life:0,max:0.18,r:2,c:u.glow,add:true}); }
}
function spawnShotVisual(u,x,y,tx,ty,d,struct){
  const ang=Math.atan2(ty-y,tx-x), sp = d.proj==='beam'?1500: d.proj==='wave'?620: d.proj==='dbolt'?620:780;
  shots.push({ kind:d.proj, x,y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, side:u.side, dmg:d.dmg,
    pierce: d.pierce||0, c:u.glow, life:0, max:1.4, struct, cosmetic:!!struct, hitIds: d.pierce? new Set():null });
}

// ---------------------------------------------------------------- update
function update(dt){
  if(hitstop>0){ hitstop-=dt; dt*=0.15; }
  t+=dt;
  if(flash>0) flash=Math.max(0,flash-dt*2.4);
  if(shake>0) shake=Math.max(0,shake-dt*30);

  // economy
  const droneAlive = units.some(u=>!u.dead && u.type==='drone');
  energy=Math.min(ENERGY_CAP, energy + (droneAlive?4.5:9)*dt);
  for(const k of CARD_ORDER) if(cds[k]>0) cds[k]-=dt;

  // spawns
  spawnTimer-=dt;
  if(spawnTimer<=0){ spawnDark(darkPick()); spawnTimer=spawnInterval(); }
  if(!bossOut && core.hp < core.max*0.4){ bossOut=true; spawnDark('umbra');
    floats.push({ x:W*0.5, y:160, txt:'UMBRA AWAKENS', c:'#c77bff', life:0, max:2.4, vy:-8, big:true }); shake=16; }

  // unit AI
  let rL=-1, lD=1e9, anyL=false, anyD=false;
  for(const u of units){
    if(u.dead) continue;
    u.anim+=dt; if(u.hitFlash>0) u.hitFlash-=dt*2.2; if(u.atkAnim>0) u.atkAnim-=dt*3.5;
    if(u.atk>0) u.atk-=dt; if(u.slowed>0) u.slowed-=dt;
    if(u.side==='light'){ anyL=true; if(u.x>rL) rL=u.x; } else { anyD=true; if(u.x<lD) lD=u.x; }

    // Victor: rush to a forward position, then plant a stationary Light Prism turret
    if(u.def.plant && !u.planted){
      if(u.x < u.plantX-2){ u.moving=true; u.x=Math.min(u.plantX, u.x + u.def.speed*dt); u.x=Math.max(BASE_X+18,Math.min(CORE_X-18,u.x)); continue; }
      u.planted=true;
      for(let i=0;i<16;i++){ const a=Math.random()*6.28; parts.push({x:u.x,y:GROUND-8,vx:Math.cos(a)*70,vy:-Math.random()*120,g:220,life:0,max:0.5,r:2+Math.random()*2,c:u.glow,add:true}); }
    }

    const d=u.def;
    let target=acquire(u);
    let dist, tx;
    if(target){ dist=Math.abs(target.x-u.x); tx=target.x; }
    else { tx=structXFor(u.side==='light'?'dark':'light'); dist=Math.abs(tx-u.x); }

    const inRange = dist <= d.range + (target?0:30);
    if(inRange){
      u.moving=false;
      if(u.atk<=0){
        u.atk=d.atkCd; u.atkAnim=1;
        if(d.melee){
          // melee / AoE
          if(d.aoe){ // boss sweep
            for(const e of units){ if(e.dead||e.side===u.side) continue; if(Math.abs(e.x-u.x)<d.aoe){ damageUnit(e,d.dmg,u.side==='light'); } }
            // hit structure if close
            if(!target && dist<=d.range){ const s=u.side==='light'?core:base; s.hp-=d.dmg; }
            shake=Math.max(shake,10); sBoom();
            for(let i=0;i<14;i++){ const a=Math.random()*6.28; parts.push({x:u.x,y:u.y-20,vx:Math.cos(a)*180,vy:Math.sin(a)*180,g:60,life:0,max:0.6,r:3,c:'#b266ff',add:false}); }
          } else if(target){ damageUnit(target,d.dmg,u.side==='light');
            for(let i=0;i<5;i++){ const a=(u.side==='light'?0:Math.PI)+(Math.random()-0.5); parts.push({x:u.x+(u.side==='light'?u.w*0.4:-u.w*0.4),y:u.y-u.h*0.5,vx:Math.cos(a)*140,vy:Math.sin(a)*140-40,g:120,life:0,max:0.3,r:2.5,c:u.glow,add:u.side==='light'}); }
            sHit();
          } else { const s=u.side==='light'?core:base; s.hp-=d.dmg; sHit(); }
        } else {
          fireShot(u, target? target : {struct:true, x:tx, y:u.y});
        }
      }
    } else {
      u.moving=true;
      const sp = (u.planted?0:d.speed) * (u.slowed>0?0.55:1);
      const dir = u.def.omni ? Math.sign(tx-u.x) : (u.side==='light'?1:-1);
      u.x += dir*sp*dt;
    }
    u.x = Math.max(BASE_X+18, Math.min(CORE_X-18, u.x));
    // gentle bob + fly hover
    if(u.fly){ u.y = u.baseY + Math.sin(u.anim*2.4)*5; }
  }

  // Andreea slow aura
  for(const a of units){ if(a.dead||a.type!=='andreea') continue;
    for(const e of units){ if(e.dead||e.side==='dark'===false) continue;
      if(Math.abs(e.x-a.x) < a.def.slowR) e.slowed=0.25; } }

  // front line for sky
  let f = (anyL&&anyD) ? (rL+lD)/2 : (anyL? Math.min(CORE_X, rL+120) : (anyD? Math.max(BASE_X, lD-120) : W*0.5));
  frontX += (f-frontX)*Math.min(1, dt*3);

  // shots
  for(let i=shots.length-1;i>=0;i--){
    const s=shots[i]; s.life+=dt;
    if(s.kind==='bomb'){
      s.vy+=s.g*dt; s.x+=s.vx*dt; s.y+=s.vy*dt;
      // trail
      if(!reduce) parts.push({x:s.x,y:s.y,vx:0,vy:0,g:0,life:0,max:0.3,r:3,c:s.c,add:true});
      if(s.y>=GROUND-6 || (s.vx>0? s.x>=s.gx : s.x<=s.gx)){
        // explode
        for(const e of units){ if(e.dead||e.side===s.side) continue; if(Math.hypot(e.x-s.x,(e.y-s.y))<s.splash){ damageUnit(e,s.dmg, s.side==='light'); } }
        if(Math.abs(s.x-CORE_X)<s.splash && s.side==='light'){ core.hp-=s.dmg; }
        if(Math.abs(s.x-BASE_X)<s.splash && s.side==='dark'){ base.hp-=s.dmg; }
        for(let k=0;k<(reduce?10:24);k++){ const a=Math.random()*6.28,vp=60+Math.random()*200; parts.push({x:s.x,y:GROUND-8,vx:Math.cos(a)*vp,vy:Math.sin(a)*vp-80,g:200,life:0,max:0.6,r:2+Math.random()*4,c:s.c,add:true}); }
        shake=Math.max(shake,8); sBoom(); shots.splice(i,1); continue;
      }
      continue;
    }
    s.x+=s.vx*dt; s.y+=s.vy*dt;
    if(s.life>s.max || s.x<-40||s.x>W+40||s.y<-40||s.y>H+40){ shots.splice(i,1); continue; }
    // collide with units
    let hit=false;
    if(!s.cosmetic) for(const e of units){ if(e.dead||e.side===s.side) continue;
      if(Math.abs(e.x-s.x)<e.w*0.55 && Math.abs((e.y-e.h*0.5)-s.y)<e.h*0.6){
        if(s.hitIds){ if(s.hitIds.has(e)) continue; s.hitIds.add(e); }
        damageUnit(e,s.dmg, s.side==='light');
        for(let k=0;k<5;k++){ const a=Math.random()*6.28; parts.push({x:s.x,y:s.y,vx:Math.cos(a)*90,vy:Math.sin(a)*90,g:0,life:0,max:0.2,r:2,c:s.c,add:s.side==='light'}); }
        if(s.pierce){ s.pierce--; if(s.pierce<0){ hit=true; } } else { hit=true; }
        if(hit) break;
      }
    }
    if(hit){ shots.splice(i,1); continue; }
  }

  // particles
  for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.life+=dt; if(p.life>=p.max){ parts.splice(i,1); continue; }
    p.vy+=(p.g||0)*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.96; }
  // floats
  for(let i=floats.length-1;i>=0;i--){ const fl=floats[i]; fl.life+=dt; if(fl.life>=fl.max){ floats.splice(i,1); continue; } fl.y+=fl.vy*dt; }

  // cleanup dead (after a beat so death pose isn't needed; we removed instantly via particles)
  units = units.filter(u=>!u.dead);

  // win / lose
  if(core.hp<=0){ core.hp=0; if(state==='play'){ state='win'; sWin(); } }
  if(base.hp<=0){ base.hp=0; if(state==='play'){ state='lose'; sLose(); } }
}

// ---------------------------------------------------------------- DRAW: characters
function glowBall(x,y,r,c,a){ const g=ctx.createRadialGradient(x,y,0,x,y,r); g.addColorStop(0,rgba(c,a)); g.addColorStop(1,rgba(c,0)); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,6.2832); ctx.fill(); }
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); }

// generic stylised humanoid; origin at feet, faces +x
function humanoid(u,o){
  const t2=u.anim, moving=u.moving, lunge = u.atkAnim>0 ? Math.sin((1-u.atkAnim)*Math.PI)*o.lunge : 0;
  const sw = moving ? Math.sin(t2*o.gait) : Math.sin(t2*2)*0.15;
  const bob = moving ? Math.abs(Math.sin(t2*o.gait))*o.bob : 0;
  const H0 = -o.h, hipY=H0*0.46, shoY=H0*0.74, headY=H0*0.9;
  ctx.save(); ctx.translate(lunge,0);
  // back leg
  legDraw(o, -sw, hipY, o.legBack);
  // cape
  if(o.cape){ ctx.save(); ctx.fillStyle=o.cape; ctx.globalAlpha=0.95;
    ctx.beginPath(); ctx.moveTo(-o.w*0.18, shoY-bob);
    ctx.quadraticCurveTo(-o.w*0.55, hipY, -o.w*0.30 - moving*sw*6, 2);
    ctx.lineTo(o.w*0.10, 2); ctx.quadraticCurveTo(o.w*0.05, hipY, o.w*0.10, shoY-bob); ctx.closePath(); ctx.fill(); ctx.restore(); }
  // front leg
  legDraw(o, sw, hipY, o.leg);
  // torso
  ctx.save(); ctx.translate(0,-bob);
  const gradT=ctx.createLinearGradient(0,H0,0,hipY); gradT.addColorStop(0,o.body1); gradT.addColorStop(1,o.body2);
  ctx.fillStyle=gradT; ctx.strokeStyle=o.line; ctx.lineWidth=2;
  rr(-o.w*(o.bulky?0.34:0.26), shoY, o.w*(o.bulky?0.68:0.52), hipY-shoY+ o.h*0.16, o.w*0.16); ctx.fill(); ctx.stroke();
  // chest emblem
  if(o.emblem){ glowBall(0, (shoY+hipY)/2, o.w*0.16, o.emblem, 0.9); }
  // back arm
  armDraw(o,-sw*0.8,shoY,o.body2,false);
  // head
  ctx.fillStyle=o.head; ctx.strokeStyle=o.line;
  ctx.beginPath(); ctx.arc(0,headY,o.w*0.22,0,6.2832); ctx.fill(); ctx.stroke();
  // visor / eyes
  ctx.fillStyle=o.eye; ctx.beginPath(); ctx.ellipse(o.w*0.07, headY, o.w*0.12, o.w*0.06, 0, 0,6.2832); ctx.fill();
  glowBall(o.w*0.07, headY, o.w*0.16, o.eye, 0.5);
  // front arm + weapon
  armDraw(o, sw*0.9, shoY, o.body1, true);
  weaponDraw(u,o,shoY);
  ctx.restore(); // torso
  ctx.restore(); // lunge
}
function legDraw(o,sw,hipY,col){ ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=o.w*0.20; ctx.lineCap='round';
  const kx=sw*o.w*0.22, fx=sw*o.w*0.34;
  ctx.beginPath(); ctx.moveTo(o.w*0.02,hipY); ctx.lineTo(kx, hipY*0.5); ctx.lineTo(fx,0); ctx.stroke(); ctx.restore(); }
function armDraw(o,sw,shoY,col,front){ ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=o.w*0.17; ctx.lineCap='round';
  const ex=sw*o.w*0.5, ey=shoY+o.h*0.16; ctx.beginPath(); ctx.moveTo(0,shoY+2); ctx.lineTo(ex, ey); ctx.stroke(); ctx.restore(); }
function weaponDraw(u,o,shoY){
  const wp=o.weapon; if(!wp||wp==='none') return; const handX=o.w*0.46, handY=shoY+o.h*0.18;
  ctx.save();
  if(wp==='rifle'){ ctx.fillStyle=o.metal||'#cfd6ff'; rr(handX-2,handY-4, o.w*0.7, 7, 3); ctx.fill();
    glowBall(handX+o.w*0.7, handY-1, 7, o.glow, u.atkAnim>0?0.95:0.4); }
  else if(wp==='staff'){ ctx.strokeStyle=o.metal||'#dfe6ff'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(handX,handY+6); ctx.lineTo(handX+o.w*0.2, shoY-o.h*0.3); ctx.stroke();
    glowBall(handX+o.w*0.2, shoY-o.h*0.3, 12+ (u.atkAnim>0?6:0), o.glow, 0.9); }
  else if(wp==='tome'){ ctx.fillStyle=o.metal||'#3b2a55'; rr(handX-4,handY-10,22,28,4); ctx.fill();
    ctx.strokeStyle=o.glow; ctx.lineWidth=2; ctx.stroke(); glowBall(handX+7,handY+4, 14+(u.atkAnim>0?8:0), o.glow,0.8); }
  else if(wp==='gauntlet'){ ctx.fillStyle=o.metal||'#ffb15a'; ctx.beginPath(); ctx.arc(handX+4,handY+2,o.w*0.16,0,6.28); ctx.fill();
    glowBall(handX+4,handY+2, o.w*0.3*(u.atkAnim>0?1.4:1), o.glow, 0.6); }
  else if(wp==='radu'){ // radiant fists / beam emitter
    glowBall(handX, handY, 12+(u.atkAnim>0?14:0), '#ffffff', 0.9); glowBall(handX,handY,22,o.glow,0.6); }
  else if(wp==='prism'){ const px=handX+4, py=shoY-2; ctx.save(); ctx.translate(px,py); ctx.rotate(u.anim*1.5);
    ctx.fillStyle=o.metal||'#dffaf6'; ctx.strokeStyle=o.glow; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(7,0); ctx.lineTo(0,9); ctx.lineTo(-7,0); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
    glowBall(px,py, 12+(u.atkAnim>0?12:0), o.glow, 0.85); }
  else if(wp==='blade'){ const ex=handX+o.w*0.55+(u.atkAnim>0?9:0);
    ctx.strokeStyle=rgba(o.glow,0.5); ctx.lineWidth=6; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(handX,handY); ctx.lineTo(ex,handY-7); ctx.stroke();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(handX,handY); ctx.lineTo(ex,handY-7); ctx.stroke();
    glowBall(ex,handY-7,8,o.glow,0.8); }
  ctx.restore();
}

// per-type opts
function optsFor(u){
  const d=u.def, e=u.side==='dark';
  const base = { w:d.w, h:d.h, glow:d.glow, gait: d.speed>70?13: d.speed<30?6:9, bob:3, lunge:6, line:'rgba(0,0,0,0.35)' };
  if(!e){
    if(u.type==='trooper') return {...base, body1:'#bfefff', body2:'#3aa8d8', legBack:'#1f6fa0', leg:'#2f93c4', head:'#eafaff', eye:'#5fe6ff', metal:'#dff7ff', weapon:'rifle', emblem:'#5fe6ff'};
    if(u.type==='manu') return {...base, bulky:true, body1:'#ffb15a', body2:'#c85d1e', legBack:'#7a3a12', leg:'#a04d18', head:'#ffe0bf', eye:'#ffd24a', metal:'#ffd9a8', weapon:'gauntlet', cape:'#7a3a12', emblem:'#ffd24a', lunge:8, bob:2};
    if(u.type==='victor') return {...base, body1:'#9af2e8', body2:'#21b3a4', legBack:'#136b62', leg:'#1b9488', head:'#eafffb', eye:'#5fe6d8', metal:'#dffaf6', weapon:'prism', cape:'#136b62', emblem:'#5fe6d8'};
    if(u.type==='floris') return {...base, body1:'#7df0bf', body2:'#1f9c6e', legBack:'#15634a', leg:'#1d8a63', head:'#eafff5', eye:'#4fe0a0', metal:'#3b2a55', weapon:'tome', cape:'#15634a', emblem:'#4fe0a0'};
    if(u.type==='andreea') return {...base, body1:'#c3d4ff', body2:'#6f8fe0', legBack:'#46588f', leg:'#5a72b8', head:'#eef2ff', eye:'#b47bff', metal:'#dfe6ff', weapon:'staff', cape:'#46588f', emblem:'#8fb0ff'};
    if(u.type==='radu') return {...base, body1:'#fff3c4', body2:'#ffb43d', legBack:'#c9892a', leg:'#e0a233', head:'#fffdf2', eye:'#fff7d6', metal:'#fff', weapon:'radu', cape:'#ffb43d', emblem:'#fff7d6', gait:14, lunge:10};
    if(u.type==='pissy') return {...base, body1:'#ffc4ec', body2:'#e84db0', legBack:'#9c2876', leg:'#c43d98', head:'#fff0fa', eye:'#ff9de0', metal:'#ffd9f2', weapon:'blade', emblem:'#ff9de0', gait:15, lunge:10};
  } else {
    // shadow palette
    const s = {...base, body1:'#3a2363', body2:'#1a0f2e', legBack:'#120a22', leg:'#1f1238', head:'#2a1850', eye:d.glow, line:'rgba(0,0,0,0.5)', metal:'#5a3a9a'};
    if(u.type==='crawler') return {...s, weapon:'none'};
    if(u.type==='slinger') return {...s, weapon:'staff', glow:d.glow};
    if(u.type==='brute') return {...s, bulky:true, weapon:'gauntlet', cape:'#120a22', lunge:8};
    return s;
  }
  return base;
}

function drawDrone(u){ // floating null drone (non-humanoid)
  const t2=u.anim; ctx.save();
  ctx.rotate(Math.sin(t2*2)*0.1);
  // diamond body
  const g=ctx.createLinearGradient(0,-22,0,2); g.addColorStop(0,'#3a2363'); g.addColorStop(1,'#120a22');
  ctx.fillStyle=g; ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,-26); ctx.lineTo(18,-12); ctx.lineTo(0,2); ctx.lineTo(-18,-12); ctx.closePath(); ctx.fill(); ctx.stroke();
  // eye
  glowBall(0,-12, 9+(u.atkAnim>0?6:0), u.glow, 0.95); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,-12,3,0,6.28); ctx.fill();
  // rotor wisps
  ctx.strokeStyle=rgba(u.glow,0.5); ctx.lineWidth=2;
  for(let i=0;i<3;i++){ const a=t2*4+i*2.1; ctx.beginPath(); ctx.arc(0,-12,16, a, a+1.4); ctx.stroke(); }
  ctx.restore();
}
function drawUmbra(u){ // towering smoke boss with glowing core
  const t2=u.anim, sw=u.moving?Math.sin(t2*4)*4:0; ctx.save();
  // smoky mass
  for(let i=0;i<5;i++){ const ox=Math.sin(t2*1.3+i)*8, r=46-i*5; glowBall(ox, -u.h*0.55 - i*10, r, '#3a1d6e', 0.5); }
  const g=ctx.createLinearGradient(0,-u.h,0,0); g.addColorStop(0,'#2a1450'); g.addColorStop(1,'#0c0620');
  ctx.fillStyle=g; ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(-u.w*0.4, 0); ctx.quadraticCurveTo(-u.w*0.6, -u.h*0.6, -u.w*0.2+sw, -u.h);
  ctx.quadraticCurveTo(0,-u.h*1.08, u.w*0.2-sw, -u.h);
  ctx.quadraticCurveTo(u.w*0.6,-u.h*0.6, u.w*0.4, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
  // core
  glowBall(0,-u.h*0.55, 30+(u.atkAnim>0?20:0), u.glow, 0.95);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,-u.h*0.55, 9,0,6.28); ctx.fill();
  // eyes
  ctx.fillStyle=u.glow; ctx.beginPath(); ctx.ellipse(-14,-u.h*0.86,5,8,0,0,6.28); ctx.ellipse(14,-u.h*0.86,5,8,0,0,6.28); ctx.fill();
  ctx.restore();
}

function drawUnit(u){
  const flip = u.side==='dark';
  ctx.save();
  ctx.translate(u.x, GROUND);
  // ground shadow
  ctx.save(); ctx.globalAlpha=0.32; ctx.fillStyle='#000'; ctx.beginPath();
  ctx.ellipse(0, u.fly? 8: 4, u.w*0.55, u.w*0.22, 0, 0, 6.2832); ctx.fill(); ctx.restore();
  ctx.translate(0, -u.fly);
  if(flip) ctx.scale(-1,1);
  // aura
  ctx.save(); ctx.globalCompositeOperation='lighter'; glowBall(0,-u.h*0.5, u.w*0.95, u.glow, u.side==='light'?0.42:0.34); ctx.restore();
  // body
  if(u.type==='drone') drawDrone(u);
  else if(u.type==='umbra') drawUmbra(u);
  else { if(u.planted){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.strokeStyle=rgba(u.glow,0.55); ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(0,2,u.w*0.75,u.w*0.28,0,0,6.2832); ctx.stroke(); ctx.restore(); } humanoid(u, optsFor(u)); }
  // hit flash
  if(u.hitFlash>0){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=Math.min(0.9,u.hitFlash); glowBall(0,-u.h*0.5,u.w*0.7,'#ffffff',0.9); ctx.restore(); }
  // hp bar
  if(u.hp<u.max){ const bw=u.w*1.1, bh=4, by=-u.h-12;
    ctx.fillStyle='rgba(0,0,0,0.5)'; rr(-bw/2,by,bw,bh,2); ctx.fill();
    ctx.fillStyle = u.side==='light'?'#9fe8ff':'#c77bff'; rr(-bw/2,by,bw*Math.max(0,u.hp/u.max),bh,2); ctx.fill(); }
  ctx.restore();
}

// ---------------------------------------------------------------- DRAW: structures
function drawTower(){ // photon tower (left)
  const x=BASE_X, lit=base.hp/base.max; ctx.save();
  glowBall(x, GROUND-90, 150, '#ffd24a', 0.25+lit*0.25);
  // base
  ctx.fillStyle='#2a2f52'; rr(x-46, GROUND-26, 92, 30, 6); ctx.fill();
  // crystal spire
  const g=ctx.createLinearGradient(x,GROUND-200,x,GROUND-20); g.addColorStop(0,'#fff7d6'); g.addColorStop(0.5,'#ffd24a'); g.addColorStop(1,'#9a6a18');
  ctx.fillStyle=g; ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x-30,GROUND-20); ctx.lineTo(x-18,GROUND-150); ctx.lineTo(x,GROUND-210); ctx.lineTo(x+18,GROUND-150); ctx.lineTo(x+30,GROUND-20); ctx.closePath(); ctx.fill(); ctx.stroke();
  glowBall(x,GROUND-160, 30, '#fff7d6', 0.8);
  // banners of light
  ctx.restore();
}
function drawCore(){ // dark core (right)
  const x=CORE_X, dmg=core.hp/core.max; ctx.save();
  for(let i=0;i<4;i++) glowBall(x, GROUND-90, 120-i*16, '#7a1fd6', 0.18);
  const g=ctx.createLinearGradient(x,GROUND-200,x,GROUND-20); g.addColorStop(0,'#3a1d6e'); g.addColorStop(1,'#0c0620');
  ctx.fillStyle=g; ctx.strokeStyle='rgba(150,90,230,0.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x-40,GROUND-20); ctx.lineTo(x-28,GROUND-170); ctx.lineTo(x,GROUND-210); ctx.lineTo(x+28,GROUND-170); ctx.lineTo(x+40,GROUND-20); ctx.closePath(); ctx.fill(); ctx.stroke();
  // cracks (pulse)
  ctx.strokeStyle=rgba('#c77bff',0.7+Math.sin(t*4)*0.2); ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(x,GROUND-190); ctx.lineTo(x-10,GROUND-120); ctx.lineTo(x+8,GROUND-80); ctx.lineTo(x-6,GROUND-30); ctx.stroke();
  glowBall(x,GROUND-120, 26+Math.sin(t*3)*4, '#c77bff', 0.9);
  ctx.restore();
}

// ---------------------------------------------------------------- DRAW: world
const stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*GROUND*0.8,r:Math.random()*1.6+0.4,a:Math.random()*0.6+0.2}));
const motes=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*GROUND,vx:(Math.random()-0.5)*8,vy:-(5+Math.random()*10),ph:Math.random()*6}));
function drawWorld(dt){
  // p = how far light has pushed (0 losing .. 1 winning), blended with core/tower hp
  const fp = (frontX-BASE_X)/(CORE_X-BASE_X);
  const hp = (core.max-core.hp)/core.max*0.5 + (base.hp/base.max)*0.5;
  const p = Math.max(0,Math.min(1, fp*0.6 + hp*0.4));

  // sky vertical
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0, mix('#06070f','#16264f',p));
  g.addColorStop(0.6, mix('#0c0a1e','#3b4f8a',p));
  g.addColorStop(1, mix('#1a0f2e','#ff9d54',p*0.9));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND+40);

  // stars fade as dawn comes
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const s of stars){ ctx.globalAlpha=s.a*(1-p)*0.9; ctx.fillStyle='#cfe0ff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.28); ctx.fill(); }
  ctx.restore();

  // distant CERN arc on horizon (signature structure)
  ctx.save(); ctx.globalCompositeOperation='lighter';
  glowBall(W*0.5, GROUND, 520, mix('#1a1f3a','#ffd9a8',p), 0.12+p*0.12);
  ctx.strokeStyle=rgba(mix('#2a3a6a','#ffd24a',p), 0.5); ctx.lineWidth=6;
  ctx.beginPath(); ctx.arc(W*0.5, GROUND+120, 300, Math.PI*1.12, Math.PI*1.88); ctx.stroke();
  ctx.lineWidth=2; ctx.strokeStyle=rgba(mix('#2a3a6a','#fff3c4',p),0.4);
  ctx.beginPath(); ctx.arc(W*0.5, GROUND+120, 280, Math.PI*1.12, Math.PI*1.88); ctx.stroke();
  ctx.restore();

  // distant hills (parallax silhouettes)
  ctx.fillStyle=mix('#0a0c1c','#243a6b',p*0.7);
  ctx.beginPath(); ctx.moveTo(0,GROUND); for(let i=0;i<=W;i+=60){ ctx.lineTo(i, GROUND-50-Math.sin(i*0.01)*30-((i>W*0.5)?0:10)); } ctx.lineTo(W,GROUND); ctx.fill();

  // horizontal light->dark overlay, boundary at front
  const fn=Math.max(0.05,Math.min(0.95,(frontX)/W));
  const warm=ctx.createLinearGradient(0,0,W,0);
  warm.addColorStop(0, rgba('#ffcaa0',0.16)); warm.addColorStop(Math.max(0,fn-0.12), rgba('#ffd24a',0.1));
  warm.addColorStop(fn, rgba('#ffd24a',0)); warm.addColorStop(1, rgba('#ffd24a',0));
  ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.fillStyle=warm; ctx.fillRect(0,0,W,GROUND); ctx.restore();
  const dark=ctx.createLinearGradient(0,0,W,0);
  dark.addColorStop(0,rgba('#1a0f2e',0)); dark.addColorStop(fn,rgba('#1a0f2e',0));
  dark.addColorStop(Math.min(1,fn+0.14),rgba('#0c0620',0.4)); dark.addColorStop(1,rgba('#0c0620',0.6));
  ctx.fillStyle=dark; ctx.fillRect(0,0,W,GROUND);

  // ground
  const gg=ctx.createLinearGradient(0,GROUND,0,H); gg.addColorStop(0, mix('#15162a','#3a3152',p*0.5)); gg.addColorStop(1,'#070710');
  ctx.fillStyle=gg; ctx.fillRect(0,GROUND,W,H-GROUND);
  // ground lit/dark seam
  const gseam=ctx.createLinearGradient(0,0,W,0); gseam.addColorStop(0,rgba('#ffd24a',0.10)); gseam.addColorStop(fn,rgba('#ffd24a',0)); gseam.addColorStop(1,rgba('#7a1fd6',0.08));
  ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.fillStyle=gseam; ctx.fillRect(0,GROUND,W,H-GROUND); ctx.restore();
  // ground line
  ctx.strokeStyle=rgba('#ffffff',0.06); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();

  // front-line shaft of light (signature)
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const fl=ctx.createLinearGradient(frontX-50,0,frontX+50,0); fl.addColorStop(0,rgba('#5fe6ff',0)); fl.addColorStop(0.5,rgba('#bfefff',0.10+Math.sin(t*5)*0.03)); fl.addColorStop(1,rgba('#5fe6ff',0));
  ctx.fillStyle=fl; ctx.fillRect(frontX-50,0,100,GROUND);
  glowBall(frontX,GROUND-6, 60, '#bfefff', 0.18);
  ctx.restore();

  // ambient motes (photons on the lit side)
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const m of motes){ m.x+=m.vx*dt; m.y+=m.vy*dt; m.ph+=dt; if(m.y<-6){ m.y=GROUND+6; m.x=Math.random()*W; }
    const lit = m.x<frontX; ctx.globalAlpha=(0.3+Math.sin(m.ph*2)*0.2)*(lit?0.7:0.3);
    ctx.fillStyle= lit?'#ffe9a8':'#9a6fd6'; ctx.beginPath(); ctx.arc(m.x,m.y,1.6,0,6.28); ctx.fill(); }
  ctx.restore();
}

// ---------------------------------------------------------------- DRAW: fx + ui
function drawShots(){
  for(const s of shots){ ctx.save(); ctx.globalCompositeOperation='lighter';
    if(s.kind==='beam'){ const a=Math.atan2(s.vy,s.vx); glowBall(s.x,s.y,16,s.c,0.8);
      ctx.strokeStyle=rgba('#ffffff',0.9); ctx.lineWidth=4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(s.x-Math.cos(a)*22,s.y-Math.sin(a)*22); ctx.lineTo(s.x+Math.cos(a)*10,s.y+Math.sin(a)*10); ctx.stroke(); }
    else if(s.kind==='bomb'){ glowBall(s.x,s.y,14,s.c,0.8); ctx.fillStyle='#eafff5'; ctx.beginPath(); ctx.arc(s.x,s.y,4,0,6.28); ctx.fill(); }
    else { glowBall(s.x,s.y,11,s.c,0.8); ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(s.x,s.y,2.6,0,6.28); ctx.fill();
      const a=Math.atan2(s.vy,s.vx); ctx.strokeStyle=rgba(s.c,0.5); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(s.x-Math.cos(a)*12,s.y-Math.sin(a)*12); ctx.lineTo(s.x,s.y); ctx.stroke(); }
    ctx.restore(); }
}
function drawParts(){ for(const p of parts){ const a=1-p.life/p.max; ctx.save();
    if(p.add) ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=Math.max(0,a); ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.add?a+0.4:1),0,6.28); ctx.fill(); ctx.restore(); } }
function drawFloats(){ for(const f of floats){ const a=1-f.life/f.max; ctx.save(); ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=f.c; ctx.textAlign='center'; ctx.font= f.big?'800 38px system-ui':'700 16px system-ui';
    ctx.shadowColor=rgba(f.c,0.8); ctx.shadowBlur=12; ctx.fillText(f.txt,f.x,f.y); ctx.restore(); } }

function barTop(x,y,w,h,frac,c1,c2,label,val,right){
  ctx.fillStyle='rgba(0,0,0,0.45)'; rr(x,y,w,h,h/2); ctx.fill();
  const g=ctx.createLinearGradient(x,0,x+w,0); g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle=g; const fw=w*Math.max(0,Math.min(1,frac));
  if(right){ rr(x+w-fw,y,fw,h,h/2);} else { rr(x,y,fw,h,h/2);} ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='700 13px system-ui'; ctx.textAlign=right?'right':'left';
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=6;
  ctx.fillText(label, right? x+w : x, y-7); ctx.shadowBlur=0;
}
function drawHUD(){
  ctx.textBaseline='alphabetic';
  // top bars
  barTop(28, 30, 360, 16, base.hp/base.max, '#9a6a18','#ffd24a', 'PHOTON TOWER', null, false);
  barTop(W-28-360, 30, 360, 16, core.hp/core.max, '#7a1fd6','#c77bff', 'DARK CORE', null, true);
  // center info
  ctx.fillStyle='#cdd6ff'; ctx.textAlign='center'; ctx.font='800 18px system-ui';
  ctx.fillText('FRONTLINE OF LIGHT', W/2, 30);
  ctx.font='600 13px system-ui'; ctx.fillStyle='#8a90c0';
  ctx.fillText('Kills '+kills+'   ·   '+(t).toFixed(0)+'s'+(muted?'   ·   muted':''), W/2, 50);

  // energy bar
  const ex=(W-872)/2, ew=872, ey=614;
  ctx.fillStyle='rgba(0,0,0,0.5)'; rr(ex,ey,ew,10,5); ctx.fill();
  const eg=ctx.createLinearGradient(ex,0,ex+ew,0); eg.addColorStop(0,'#3a7bd0'); eg.addColorStop(0.5,'#5fe6ff'); eg.addColorStop(1,'#ffd24a');
  ctx.fillStyle=eg; rr(ex,ey,ew*(energy/ENERGY_CAP),10,5); ctx.fill();
  ctx.fillStyle='#bfefff'; ctx.font='700 12px system-ui'; ctx.textAlign='left';
  ctx.fillText('LIGHT ENERGY  '+Math.floor(energy), ex, ey-6);

  // cards
  cardRects().forEach((r,i)=>{ const key=CARD_ORDER[i], d=LIGHT[key], can=energy>=d.cost && cds[key]<=0;
    ctx.save();
    ctx.fillStyle = can? 'rgba(22,26,48,0.92)':'rgba(14,16,30,0.92)';
    ctx.strokeStyle = can? rgba(d.glow,0.8):'rgba(120,130,170,0.25)'; ctx.lineWidth=2;
    rr(r.x,r.y,r.w,r.h,12); ctx.fill(); ctx.stroke();
    if(can){ ctx.save(); ctx.globalCompositeOperation='lighter'; glowBall(r.x+r.w/2, r.y+r.h/2, r.w*0.7, d.glow, 0.07); ctx.restore(); }
    // mini portrait
    ctx.save(); ctx.translate(r.x+30, r.y+r.h*0.64); const s=0.52; ctx.scale(s,s);
    const mu={ side:'light', type:key, def:d, anim:t*0.6+i, moving:false, atkAnim:0, hitFlash:0, hp:1, max:1, w:d.w, h:d.h, glow:d.glow, fly:0 };
    ctx.save(); ctx.globalCompositeOperation='lighter'; glowBall(0,-d.h*0.5,d.w*0.9,d.glow,0.4); ctx.restore();
    humanoid(mu, optsFor(mu)); ctx.restore();
    // text
    ctx.textAlign='left'; ctx.fillStyle= can?'#eef2ff':'#7b82a8'; ctx.font='700 13px system-ui';
    ctx.fillText(SHORT[key]||d.name, r.x+54, r.y+30);
    ctx.fillStyle= energy>=d.cost? '#ffe27a':'#c8704a'; ctx.font='800 14px system-ui';
    ctx.fillText('⚡ '+d.cost, r.x+54, r.y+52);
    ctx.fillStyle='#6b7298'; ctx.font='700 11px system-ui'; ctx.textAlign='right';
    ctx.fillText((i+1)+'', r.x+r.w-9, r.y+20);
    // cooldown sweep
    if(cds[key]>0){ const fr=cds[key]/d.cd; ctx.fillStyle='rgba(8,10,20,0.66)'; rr(r.x,r.y,r.w,r.h*fr,12); ctx.fill();
      ctx.fillStyle='#cdd6ff'; ctx.textAlign='center'; ctx.font='800 18px system-ui'; ctx.fillText(cds[key].toFixed(1), r.x+r.w/2, r.y+r.h/2+6); }
    ctx.restore();
  });
}
function cardRects(){ const n=7, cw=116, gap=10, total=n*cw+(n-1)*gap, sx=(W-total)/2, y=632, h=80;
  return CARD_ORDER.map((k,i)=>({x:sx+i*(cw+gap), y, w:cw, h, key:k})); }

// ---------------------------------------------------------------- overlays
function panel(title, lines, btn){
  ctx.fillStyle='rgba(4,5,12,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalCompositeOperation='lighter'; glowBall(W/2,H*0.36,360,'#ffd24a',0.10); ctx.restore();
}
function drawMenu(){
  drawWorld(0.016);
  ctx.fillStyle='rgba(4,5,12,0.66)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.save(); ctx.shadowColor=rgba('#ffd24a',0.6); ctx.shadowBlur=30;
  ctx.fillStyle='#ffd24a'; ctx.font='900 78px system-ui'; ctx.fillText('RADU PHOTON', W/2, 230);
  ctx.restore();
  const g=ctx.createLinearGradient(W/2-300,0,W/2+300,0); g.addColorStop(0,'#5fe6ff'); g.addColorStop(1,'#b47bff');
  ctx.fillStyle=g; ctx.font='800 30px system-ui'; ctx.fillText('ECHIPA LUMINA · FRONTLINE OF LIGHT', W/2, 272);
  ctx.fillStyle='#c8cffb'; ctx.font='500 17px system-ui';
  ctx.fillText('The darkness is advancing on the Photon Tower. Spend light energy to deploy your team —', W/2, 330);
  ctx.fillText('the right friend for each threat — push the front back, and shatter the Dark Core.', W/2, 356);
  ctx.fillStyle='#8a90c0'; ctx.font='600 14px system-ui';
  ctx.fillText('Deploy: click a card or press 1–7     ·     Pause P     ·     Mute M', W/2, 398);
  // start button
  startBtn();
  drawInstallUI();
  // little roster strip
  ctx.fillStyle='#6b7298'; ctx.font='600 13px system-ui';
  ctx.fillText('Troopers hold · Manu walls · Victor plants a turret · Floris shells · Andreea slows · Radu strikes · Pissy blinks in', W/2, H-40);
}
function startBtn(){ const w=240,h=64,x=W/2-w/2,y=448; ctx.save();
  ctx.shadowColor=rgba('#ffd24a',0.6); ctx.shadowBlur=24;
  const g=ctx.createLinearGradient(x,0,x+w,0); g.addColorStop(0,'#ffd24a'); g.addColorStop(1,'#ff9d54');
  ctx.fillStyle=g; rr(x,y,w,h,32); ctx.fill(); ctx.restore();
  ctx.fillStyle='#1a1000'; ctx.font='800 24px system-ui'; ctx.textAlign='center'; ctx.fillText('DEPLOY', W/2, y+41);
  return {x,y,w,h};
}
function drawEnd(win){
  ctx.fillStyle='rgba(4,5,12,0.8)'; ctx.fillRect(0,0,W,H); ctx.textAlign='center';
  ctx.save(); ctx.shadowColor=win?rgba('#ffd24a',0.6):rgba('#c77bff',0.5); ctx.shadowBlur=30;
  ctx.fillStyle= win? '#ffd24a':'#c77bff'; ctx.font='900 64px system-ui';
  ctx.fillText(win?'LIGHT PREVAILS':'THE TOWER HAS FALLEN', W/2, 250); ctx.restore();
  ctx.fillStyle='#c8cffb'; ctx.font='600 18px system-ui';
  ctx.fillText(win? 'Echipa Lumina shattered the Dark Core.  Kills: '+kills+'  ·  '+t.toFixed(0)+'s'
                  : 'The darkness overran the Photon Tower.  Hold the line longer next time.', W/2, 300);
  ctx.fillStyle='#8aa0d0'; ctx.font='500 15px system-ui';
  ctx.fillText(win?'Friendship was stronger than power.':'Regroup — and deploy the right friend at the right moment.', W/2, 330);
  retryBtn();
}
function retryBtn(){ const w=240,h=60,x=W/2-w/2,y=380; ctx.save(); ctx.shadowColor=rgba('#5fe6ff',0.5); ctx.shadowBlur=22;
  const g=ctx.createLinearGradient(x,0,x+w,0); g.addColorStop(0,'#5fe6ff'); g.addColorStop(1,'#b47bff');
  ctx.fillStyle=g; rr(x,y,w,h,30); ctx.fill(); ctx.restore();
  ctx.fillStyle='#04121a'; ctx.font='800 22px system-ui'; ctx.textAlign='center'; ctx.fillText('AGAIN', W/2, y+39); return {x,y,w,h}; }

// ---------------------------------------------------------------- render
function render(dt){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W,H);
  let sx=0,sy=0; if(shake>0){ sx=(Math.random()-0.5)*shake; sy=(Math.random()-0.5)*shake; }
  ctx.save(); ctx.translate(sx,sy);
  if(state==='menu'){ ctx.restore(); ctx.save(); ctx.translate(sx,sy); drawMenu(); ctx.restore(); return; }
  drawWorld(dt);
  drawCore(); drawTower();
  // sort units by x for a touch of depth (draw far/back consistent)
  const sorted=units.slice().sort((a,b)=>a.y-b.y || a.x-b.x);
  for(const u of sorted) drawUnit(u);
  drawShots(); drawParts(); drawFloats();
  drawHUD();
  ctx.restore();
  // white flash
  if(flash>0){ ctx.fillStyle=rgba('#ffffff',flash*0.5); ctx.fillRect(0,0,W,H); }
  if(state==='paused'){ ctx.fillStyle='rgba(4,5,12,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='800 48px system-ui'; ctx.fillText('PAUSED', W/2,H/2); 
    ctx.fillStyle='#9aa0c8'; ctx.font='500 16px system-ui'; ctx.fillText('Press P to resume', W/2, H/2+40); }
  if(state==='win') drawEnd(true);
  if(state==='lose') drawEnd(false);
}

// ---------------------------------------------------------------- loop
function frame(now){ try{ let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05;
  if(state==='play') update(dt);
  render(dt); }catch(err){ console.error(err); } requestAnimationFrame(frame); }

// ---------------------------------------------------------------- input
function toLocal(e){ const r=canvas.getBoundingClientRect(); return { x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H }; }
function inRect(p,r){ return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }
function deploy(key){ const d=LIGHT[key]; if(state!=='play') return;
  if(energy>=d.cost && cds[key]<=0){ energy-=d.cost; cds[key]=d.cd; spawnLight(key); sDeploy(); }
  else { beep(160,0.1,'sine',120,0.15); } }
function tap(p){
  audio();
  if(state==='menu'){ const ib=installRect(); if(ib && inRect(p,ib)){ onInstallTap(); return; } if(inRect(p,startBtn())){ reset(); state='play'; } return; }
  if(state==='win'||state==='lose'){ if(inRect(p,retryBtn())){ reset(); state='play'; } return; }
  if(state==='play'){ const rs=cardRects(); for(let i=0;i<rs.length;i++) if(inRect(p,rs[i])){ deploy(rs[i].key); return; } }
}
canvas.addEventListener('pointerdown', e=>{ e.preventDefault(); tap(toLocal(e)); });
addEventListener('keydown', e=>{ const k=e.key.toLowerCase();
  if(k>='1'&&k<='7'){ deploy(CARD_ORDER[+k-1]); }
  if(k==='m'){ muted=!muted; if(mg) mg.gain.value=muted?0:0.16; }
  if(k==='p'){ if(state==='play') state='paused'; else if(state==='paused') state='play'; }
  if((k===' '||k==='enter')){ if(state==='menu'){ reset(); state='play'; } else if(state==='win'||state==='lose'){ reset(); state='play'; } e.preventDefault(); }
});

// ---------------------------------------------------------------- PWA install
let deferredPrompt=null, canInstall=false, showIOSHint=false;
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent||'');
function isStandalone(){ return matchMedia('(display-mode: standalone)').matches || matchMedia('(display-mode: fullscreen)').matches || navigator.standalone===true; }
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredPrompt=e; canInstall=true; });
addEventListener('appinstalled', ()=>{ canInstall=false; deferredPrompt=null; showIOSHint=false; });
function installRect(){ if(isStandalone()) return null; if(!(canInstall || isIOS)) return null; const w=230,h=46; return { x:W/2-w/2, y:524, w, h }; }
async function onInstallTap(){
  if(canInstall && deferredPrompt){ const p=deferredPrompt; deferredPrompt=null; canInstall=false; try{ p.prompt(); await p.userChoice; }catch(e){} }
  else if(isIOS){ showIOSHint=!showIOSHint; }
}
function drawInstallUI(){
  const r=installRect(); if(!r) return;
  ctx.save();
  ctx.strokeStyle=rgba('#5fe6ff',0.7); ctx.lineWidth=2; ctx.fillStyle='rgba(18,22,40,0.7)';
  rr(r.x,r.y,r.w,r.h,r.h/2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#bfefff'; ctx.font='800 16px system-ui'; ctx.textAlign='center';
  ctx.fillText((isIOS && !canInstall) ? 'Add to Home Screen' : 'Install app', W/2, r.y+29);
  ctx.restore();
  if(showIOSHint){
    ctx.fillStyle='#9aa0c8'; ctx.font='600 14px system-ui'; ctx.textAlign='center';
    ctx.fillText('On iPhone/iPad: tap the Share button, then', W/2, r.y+r.h+26);
    ctx.fillText('choose "Add to Home Screen".', W/2, r.y+r.h+48);
  }
}

reset(); state='menu';
requestAnimationFrame(frame);
})();
</script>
