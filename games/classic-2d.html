<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Radu Photon</title>
<style>
  :root{
    --void:#05060f; --radu:#ffd54a; --cyan:#5fe6ff; --violet:#b47bff;
    --amber:#ffc24a; --ink:#e7ecff; --muted:#8a90b8;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:radial-gradient(1200px 700px at 50% -10%, #11163a 0%, var(--void) 60%);
    color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center;
    height:100vh; overflow:hidden; user-select:none;
  }
  .mono{ font-family:"Cascadia Code",Consolas,"SF Mono",ui-monospace,monospace; }

  #stage{
    position:relative; aspect-ratio:1.6;
    width:min(100vw, calc(100vh * 1.6));
    border-radius:14px; overflow:hidden;
    box-shadow:0 0 0 1px rgba(120,140,255,.12), 0 30px 90px rgba(0,0,0,.6),
               0 0 120px rgba(95,230,255,.06);
  }
  canvas{ display:block; width:100%; height:100%; cursor:crosshair; }

  #hud{
    position:absolute; inset:0 0 auto 0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:clamp(10px,2.2vmin,22px); pointer-events:none;
    font-size:clamp(11px,1.9vmin,16px);
  }
  .hud-left{ display:flex; gap:clamp(14px,3vmin,30px); align-items:flex-start; }
  .hud-right{ display:flex; flex-direction:column; gap:clamp(8px,1.6vmin,14px);
              align-items:flex-end; text-align:right; }
  .stat{ display:flex; flex-direction:column; gap:5px; }
  .label{ color:var(--muted); letter-spacing:.16em; text-transform:uppercase; font-size:.72em; }
  .value{ font-size:1.5em; font-weight:600; text-shadow:0 0 14px rgba(95,230,255,.45); }
  .bar{ width:clamp(90px,16vmin,150px); height:9px; border-radius:6px;
        background:rgba(255,255,255,.08); overflow:hidden; }
  .bar-fill{ height:100%; width:100%;
    background:linear-gradient(90deg,var(--violet),var(--cyan),var(--radu));
    box-shadow:0 0 12px rgba(95,230,255,.6); transition:width .08s linear; }
  .dash{ display:flex; align-items:center; gap:6px; color:var(--muted);
         letter-spacing:.12em; text-transform:uppercase; font-size:.72em; margin-top:4px; }
  .dash .dot{ width:9px; height:9px; border-radius:50%; background:#3a3f63; }
  .dash.ready .dot{ background:var(--radu); box-shadow:0 0 12px var(--radu); }
  .dash.ready{ color:var(--radu); }

  .screen{
    position:absolute; inset:0; z-index:5;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:6vmin;
    background:radial-gradient(120% 120% at 50% 40%, rgba(5,6,15,.35), rgba(5,6,15,.86));
    backdrop-filter:blur(2px);
  }
  h1{ margin:0; font-weight:800; line-height:.92; font-size:clamp(40px,11vmin,120px);
      letter-spacing:.04em; color:var(--radu); text-shadow:0 0 40px rgba(255,213,74,.45); }
  h1 span{ display:block; background:linear-gradient(90deg,var(--cyan),var(--violet));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:none; filter:drop-shadow(0 0 26px rgba(95,230,255,.5)); }
  .tag{ max-width:32ch; color:#c8cffb; font-size:clamp(14px,2.6vmin,21px);
        margin:3vmin 0 1vmin; line-height:1.5; }
  .tag em{ color:var(--radu); font-style:normal; }
  h2{ margin:0; font-size:clamp(28px,7vmin,64px); color:var(--cyan);
      text-shadow:0 0 30px rgba(95,230,255,.5); letter-spacing:.02em; }
  .wintime{ font-size:clamp(16px,3vmin,26px); margin:2.5vmin 0 .5vmin; color:#c8cffb; }
  .wintime span{ color:var(--radu); font-weight:700; }
  .teaser{ color:var(--violet); font-size:clamp(13px,2.2vmin,18px); margin:.5vmin 0 3vmin;
           letter-spacing:.04em; }
  button{ margin-top:1.5vmin; cursor:pointer; border:0; font:inherit; font-weight:700;
    letter-spacing:.06em; font-size:clamp(15px,2.6vmin,21px); color:#05060f;
    padding:.7em 2.2em; border-radius:999px;
    background:linear-gradient(90deg,var(--radu),var(--amber));
    box-shadow:0 0 30px rgba(255,213,74,.45);
    transition:transform .12s ease, box-shadow .12s ease; }
  button:hover{ transform:translateY(-2px); box-shadow:0 0 44px rgba(255,213,74,.7); }
  button:focus-visible{ outline:3px solid var(--cyan); outline-offset:3px; }
  .controls{ margin-top:4vmin; color:var(--muted); font-size:clamp(11px,1.9vmin,15px);
             letter-spacing:.03em; line-height:1.9; }
  kbd{ font-family:inherit; background:rgba(255,255,255,.09); border-radius:6px;
       padding:.15em .55em; margin:0 .12em; border:1px solid rgba(255,255,255,.14); color:var(--ink); }
  .hidden{ display:none !important; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="960" height="600"></canvas>

    <div id="hud" class="hidden">
      <div class="hud-left">
        <div class="stat"><span class="label">Photons</span><span id="photonCount" class="value">0 / 6</span></div>
        <div class="stat hidden" id="shardStat"><span class="label">Shards</span><span id="shardCount" class="value">0 / 0</span></div>
        <div class="stat">
          <span class="label">Light</span>
          <div class="bar"><div id="lightBar" class="bar-fill"></div></div>
          <div id="dashPip" class="dash ready"><span class="dot"></span>Dash</div>
        </div>
      </div>
      <div class="hud-right">
        <div class="stat"><span class="label">Chamber</span><span id="levelCount" class="value">1 / 2</span></div>
        <div class="stat"><span class="label">Time</span><span id="timer" class="value mono">0.0</span></div>
      </div>
    </div>

    <div id="title" class="screen">
      <h1>RADU<span>PHOTON</span></h1>
      <p class="tag">A door at CERN. A burst of light. Now you <em>are</em> light.</p>
      <button id="startBtn">Begin</button>
      <p class="controls">
        Move <kbd>W A S D</kbd> / <kbd>Arrows</kbd> &nbsp;·&nbsp; Dash <kbd>Space</kbd><br>
        Fire photon beam <kbd>Mouse</kbd> / <kbd>F</kbd> &nbsp;·&nbsp; Restart <kbd>R</kbd> &nbsp;·&nbsp; Mute <kbd>M</kbd>
      </p>
    </div>

    <div id="win" class="screen hidden">
      <h2>You are the light</h2>
      <p class="wintime">Run cleared in <span id="finalTime" class="mono">0.0</span> s</p>
      <p class="teaser">Echipa Lumina is waiting…</p>
      <button id="againBtn">Play again</button>
    </div>
  </div>

<script>
(() => {
  "use strict";
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- tuning ----------
  const MAX_SPEED=255, ACCEL_K=13;
  const DASH_SPEED=1150, DASH_TIME=0.16, DASH_CD=0.55, DASH_COST=6;
  const BLAST_SPEED=720, BLAST_CD=0.22, BLAST_COST=3, BEAM_LIFE=1.3, BEAM_R=6;
  const DRAIN=30, REGEN=11, PHOTON_GAIN=16, PLAYER_R=11;
  const BANNER_TIME=2.4;

  const C = { void:'#05060f', radu:'#fff7d6', raduGlow:'#ffd54a',
              cyan:'#5fe6ff', violet:'#b47bff', amber:'#ffc24a', star:'#9fb4ff' };

  // ---------- levels ----------
  const LEVELS = [
    {
      name:'CHAMBER 1 · THE DOOR',
      start:{x:120,y:300}, portal:{x:860,y:300},
      photons:[ {x:300,y:140},{x:540,y:300},{x:300,y:470},
                {x:660,y:150},{x:720,y:440},{x:470,y:520} ],
      pools:[ {x:430,y:215,r:74},{x:610,y:330,r:82},
              {x:360,y:430,r:60},{x:760,y:215,r:56} ],
      shards:[]
    },
    {
      name:'CHAMBER 2 · INTO THE DARK',
      start:{x:110,y:300}, portal:{x:870,y:300},
      photons:[ {x:260,y:150},{x:300,y:470},{x:620,y:140},
                {x:650,y:480},{x:800,y:300},{x:470,y:300} ],
      pools:[ {x:380,y:300,r:64},{x:640,y:180,r:58},{x:560,y:470,r:56} ],
      shards:[ {x:400,y:160},{x:540,y:430},{x:720,y:260} ]
    }
  ];

  // ---------- state ----------
  let state='title';
  let player, photons, pools, shards, portal, beams, particles, trail, stars;
  let collected=0, total=6, currentLevel=0;
  let startTime=0, elapsed=0, finalTime=0;
  let flash=0, bannerT=0, bannerText='';
  let last=performance.now();
  const keys={};
  let mouseX=W/2, mouseY=H/2, hasMouse=false, firing=false;

  // ---------- audio ----------
  let actx=null, masterGain=null, muted=false;
  function ensureAudio(){
    if (actx){ if (actx.state==='suspended') actx.resume(); return; }
    try{ actx=new (window.AudioContext||window.webkitAudioContext)();
      masterGain=actx.createGain(); masterGain.gain.value=muted?0:0.18;
      masterGain.connect(actx.destination);
    }catch(e){ actx=null; }
  }
  function tone(freq,dur,type='sine',slideTo=null,peak=0.6){
    if(!actx||muted) return;
    const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(peak,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+dur+0.03);
  }
  const sfxCollect=()=>tone(760,0.18,'sine',1340);
  const sfxDash   =()=>tone(230,0.16,'sawtooth',900,0.4);
  const sfxBlast  =()=>tone(900,0.10,'square',540,0.3);
  const sfxShatter=()=>tone(170,0.30,'sawtooth',48,0.5);
  const sfxRecharge=()=>tone(440,0.40,'sine',150,0.5);
  const sfxAdvance=()=>[523,784].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'sine'),i*110));
  const sfxWin    =()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.26,'sine'),i*120));
  function toggleMute(){ muted=!muted; if (masterGain) masterGain.gain.value=muted?0:0.18; }

  // ---------- helpers ----------
  const clamp=(v,a,b)=> v<a?a:(v>b?b:v);
  const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
  const shardsLeft=()=> shards.reduce((n,s)=> n+(s.hp>0?1:0), 0);

  // ---------- level loading ----------
  function loadLevel(i){
    const L=LEVELS[i];
    player = player || {};
    Object.assign(player, { x:L.start.x, y:L.start.y, vx:0, vy:0, fx:1, fy:0,
                            light:100, dashT:0, cd:0, bcd:0 });
    portal = { x:L.portal.x, y:L.portal.y, r:30, open:false, spin:0 };
    photons = L.photons.map(p => ({x:p.x, y:p.y, r:14, got:false, ph:Math.random()*6.28}));
    pools   = L.pools.map(p => ({...p, ph:Math.random()*6.28}));
    shards  = L.shards.map(s => ({x:s.x, y:s.y, r:24, hp:2, maxhp:2, ph:Math.random()*6.28, hit:0}));
    total = photons.length; collected = 0;
    beams=[]; particles=[]; trail=[];
    firing=false;
    if (!stars){
      stars=Array.from({length:reduceMotion?26:60}, ()=>({
        x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.6+0.4,
        a:Math.random()*0.5+0.15, vx:(Math.random()-0.5)*4 }));
    }
    flash=1; bannerT=BANNER_TIME; bannerText=L.name;
    const ss=document.getElementById('shardStat');
    ss.classList.toggle('hidden', shards.length===0);
  }

  function burst(x,y,color,n){
    if (reduceMotion) n=Math.ceil(n/2);
    for(let i=0;i<n;i++){
      const a=Math.random()*6.28, sp=Math.random()*180+40;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
        life:0,max:Math.random()*0.5+0.35,r:Math.random()*2.5+1.2,color});
    }
  }

  function dash(){
    if (state!=='play'||player.dashT>0||player.cd>0||player.light<DASH_COST) return;
    const m=Math.hypot(player.fx,player.fy)||1;
    player.vx=player.fx/m*DASH_SPEED; player.vy=player.fy/m*DASH_SPEED;
    player.dashT=DASH_TIME; player.cd=DASH_CD; player.light-=DASH_COST;
    burst(player.x,player.y,C.cyan,14); sfxDash();
  }

  function fire(ax,ay){
    if (state!=='play'||player.bcd>0||player.light<BLAST_COST) return;
    if (Math.hypot(ax,ay)<0.001){ ax=player.fx; ay=player.fy; }
    const m=Math.hypot(ax,ay)||1;
    beams.push({x:player.x, y:player.y, vx:ax/m*BLAST_SPEED, vy:ay/m*BLAST_SPEED, life:0, max:BEAM_LIFE});
    player.bcd=BLAST_CD; player.light-=BLAST_COST; sfxBlast();
  }

  function recharge(){
    const L=LEVELS[currentLevel];
    player.x=L.start.x; player.y=L.start.y; player.vx=player.vy=0;
    player.light=55; player.dashT=0;
    burst(player.x,player.y,C.violet,20); flash=0.8; sfxRecharge();
  }

  function reachExit(){
    if (currentLevel < LEVELS.length-1){
      currentLevel++; loadLevel(currentLevel); sfxAdvance();
    } else { win(); }
  }

  // ---------- update ----------
  function update(dt){
    for (const s of stars){ s.x+=s.vx*dt; if (s.x<-4) s.x=W+4; else if (s.x>W+4) s.x=-4; }
    if (flash>0) flash=Math.max(0,flash-dt*2.2);
    if (bannerT>0) bannerT=Math.max(0,bannerT-dt);
    portal.spin += dt*(portal.open?1.6:0.5);
    for (const p of photons) p.ph+=dt*3;
    for (const u of pools) u.ph+=dt*1.4;
    for (const s of shards){ s.ph+=dt*1.2; if (s.hit>0) s.hit=Math.max(0,s.hit-dt); }

    for (let i=particles.length-1;i>=0;i--){
      const p=particles[i]; p.life+=dt;
      if (p.life>=p.max){ particles.splice(i,1); continue; }
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92;
    }

    if (state!=='play') return;
    elapsed=(performance.now()-startTime)/1000;
    if (player.cd>0) player.cd-=dt;
    if (player.bcd>0) player.bcd-=dt;

    // movement
    if (player.dashT>0){
      player.dashT-=dt; player.vx*=Math.pow(0.03,dt); player.vy*=Math.pow(0.03,dt);
    } else {
      let ix=0,iy=0;
      if (keys['arrowleft']||keys['a']) ix-=1;
      if (keys['arrowright']||keys['d']) ix+=1;
      if (keys['arrowup']||keys['w']) iy-=1;
      if (keys['arrowdown']||keys['s']) iy+=1;
      if (ix||iy){ const m=Math.hypot(ix,iy); player.fx=ix/m; player.fy=iy/m; }
      const moving=(ix||iy);
      const tx=moving?player.fx*MAX_SPEED:0, ty=moving?player.fy*MAX_SPEED:0;
      const s=1-Math.exp(-ACCEL_K*dt);
      player.vx+=(tx-player.vx)*s; player.vy+=(ty-player.vy)*s;
    }
    player.x=clamp(player.x+player.vx*dt, PLAYER_R, W-PLAYER_R);
    player.y=clamp(player.y+player.vy*dt, PLAYER_R, H-PLAYER_R);

    // firing
    if (firing && hasMouse) fire(mouseX-player.x, mouseY-player.y);
    else if (keys['f']||keys['j']) fire(player.fx, player.fy);

    // beams
    for (let i=beams.length-1;i>=0;i--){
      const b=beams[i]; b.life+=dt; b.x+=b.vx*dt; b.y+=b.vy*dt;
      if (b.life>=b.max || b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){ beams.splice(i,1); continue; }
      for (const s of shards){
        if (s.hp<=0) continue;
        const rr=s.r+BEAM_R;
        if (dist2(b.x,b.y,s.x,s.y)<rr*rr){
          s.hp--; s.hit=0.18; burst(b.x,b.y,C.cyan,8); beams.splice(i,1);
          if (s.hp<=0){ burst(s.x,s.y,C.cyan,22); sfxShatter(); }
          break;
        }
      }
    }

    // trail
    const dashing=player.dashT>0;
    trail.unshift({x:player.x,y:player.y,a:dashing?1:0.6});
    if (trail.length>(dashing?26:16)) trail.pop();
    for (const t of trail) t.a-=dt*2.4;
    while (trail.length && trail[trail.length-1].a<=0) trail.pop();

    // darkness (pools + living shards)
    let inDark=false;
    if (!dashing){
      for (const u of pools){ if (dist2(player.x,player.y,u.x,u.y)<u.r*u.r){ inDark=true; break; } }
      if (!inDark) for (const s of shards){
        if (s.hp>0){ const r=s.r+6; if (dist2(player.x,player.y,s.x,s.y)<r*r){ inDark=true; break; } }
      }
    }
    if (inDark) player.light-=DRAIN*dt;
    else player.light=Math.min(100,player.light+REGEN*dt);
    if (player.light<=0) recharge();

    // collect photons
    for (const p of photons){
      if (p.got) continue;
      const rr=PLAYER_R+p.r;
      if (dist2(player.x,player.y,p.x,p.y)<rr*rr){
        p.got=true; collected++;
        player.light=Math.min(100,player.light+PHOTON_GAIN);
        burst(p.x,p.y,C.cyan,18); sfxCollect();
      }
    }

    // objective -> open portal
    if (!portal.open && collected>=total && shardsLeft()===0){
      portal.open=true; burst(portal.x,portal.y,C.amber,26);
    }

    // exit
    if (portal.open){
      const rr=PLAYER_R+portal.r;
      if (dist2(player.x,player.y,portal.x,portal.y)<rr*rr) reachExit();
    }

    updateHud();
  }

  // ---------- render ----------
  function glow(x,y,r,color,alpha){
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,color); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=alpha; ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(x,y,r,0,6.2832); ctx.fill(); ctx.globalAlpha=1;
  }

  function render(){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=C.void; ctx.fillRect(0,0,W,H);

    // void specks
    ctx.globalCompositeOperation='lighter';
    for (const s of stars){ ctx.globalAlpha=s.a; ctx.fillStyle=C.star;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.2832); ctx.fill(); }
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';

    // darkness pools
    for (const u of pools){
      const rr=u.r*(1+Math.sin(u.ph)*0.03);
      const g=ctx.createRadialGradient(u.x,u.y,rr*0.2,u.x,u.y,rr);
      g.addColorStop(0,'#160c28'); g.addColorStop(0.7,'rgba(58,29,99,0.55)');
      g.addColorStop(1,'rgba(5,6,15,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(u.x,u.y,rr,0,6.2832); ctx.fill();
      ctx.strokeStyle='rgba(120,80,200,0.25)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(u.x,u.y,rr,0,6.2832); ctx.stroke();
    }

    // shard bodies
    for (const s of shards){
      if (s.hp<=0) continue;
      const sz=s.r*(0.7+0.3*(s.hp/s.maxhp));
      ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(Math.PI/4 + Math.sin(s.ph)*0.15);
      ctx.fillStyle = s.hit>0 ? '#e6d6ff' : '#1a0f2e';
      ctx.strokeStyle='rgba(160,100,235,0.8)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.rect(-sz,-sz,sz*2,sz*2); ctx.fill(); ctx.stroke();
      ctx.restore();
    }

    ctx.globalCompositeOperation='lighter';

    // shard auras + Radu's light + photons + portal + beams + trail + particles + player
    for (const s of shards){ if (s.hp>0) glow(s.x,s.y,s.r*2,'rgba(150,90,230,0.22)',1); }
    if (player) glow(player.x,player.y,150,'rgba(255,233,160,0.10)',1);

    for (const p of photons){
      if (p.got) continue;
      const pulse=1+Math.sin(p.ph)*0.18;
      glow(p.x,p.y,34*pulse,'rgba(95,230,255,0.5)',1);
      ctx.fillStyle='#eafdff'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*0.5*pulse,0,6.2832); ctx.fill();
    }

    { const pr=portal.r;
      glow(portal.x,portal.y,pr*2.4, portal.open?'rgba(255,194,74,0.7)':'rgba(95,230,255,0.18)',1);
      ctx.save(); ctx.translate(portal.x,portal.y); ctx.rotate(portal.spin);
      ctx.lineWidth=4; ctx.strokeStyle=portal.open?'#ffd54a':'rgba(150,170,255,0.45)';
      for (let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(0,0,pr-i*7, i*2.1, i*2.1+4.2); ctx.stroke(); }
      ctx.restore();
    }

    for (const b of beams){
      const ang=Math.atan2(b.vy,b.vx);
      glow(b.x,b.y,16,'rgba(150,250,255,0.7)',1);
      ctx.strokeStyle='#dffaff'; ctx.lineWidth=3; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(b.x-Math.cos(ang)*10,b.y-Math.sin(ang)*10);
      ctx.lineTo(b.x+Math.cos(ang)*8,b.y+Math.sin(ang)*8);
      ctx.stroke();
    }

    for (let i=trail.length-1;i>=0;i--){
      const t=trail[i], a=Math.max(0,t.a);
      glow(t.x,t.y,18*a+4,'rgba(255,221,120,'+(0.22*a)+')',1);
    }

    for (const p of particles){
      const a=Math.max(0,1-p.life/p.max);
      ctx.globalAlpha=a; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.2832); ctx.fill();
    }
    ctx.globalAlpha=1;

    if (player){
      const dashing=player.dashT>0;
      glow(player.x,player.y,dashing?46:30,C.raduGlow,1);
      ctx.fillStyle=C.radu; ctx.beginPath(); ctx.arc(player.x,player.y,PLAYER_R,0,6.2832); ctx.fill();
    }

    ctx.globalCompositeOperation='source-over';

    // vignette
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.9);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

    // flash
    if (flash>0){ ctx.fillStyle='rgba(255,247,214,'+(flash*0.5)+')'; ctx.fillRect(0,0,W,H); }

    // level banner
    if (bannerT>0 && state==='play'){
      const fadeIn=clamp((BANNER_TIME-bannerT)/0.3,0,1);
      const fadeOut=clamp(bannerT/0.7,0,1);
      const a=Math.min(fadeIn,fadeOut);
      ctx.globalAlpha=a; ctx.fillStyle='#fff7d6';
      ctx.font='800 '+Math.round(H*0.07)+'px system-ui,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='rgba(255,213,74,0.7)'; ctx.shadowBlur=28;
      ctx.fillText(bannerText, W/2, H*0.4);
      ctx.shadowBlur=0; ctx.globalAlpha=1;
      ctx.textAlign='start'; ctx.textBaseline='alphabetic';
    }
  }

  // ---------- HUD ----------
  const $count=document.getElementById('photonCount');
  const $shardStat=document.getElementById('shardStat');
  const $shard=document.getElementById('shardCount');
  const $bar=document.getElementById('lightBar');
  const $timer=document.getElementById('timer');
  const $pip=document.getElementById('dashPip');
  const $level=document.getElementById('levelCount');
  function updateHud(){
    $count.textContent=collected+' / '+total;
    if (shards.length){
      $shardStat.classList.remove('hidden');
      $shard.textContent=(shards.length-shardsLeft())+' / '+shards.length;
    } else $shardStat.classList.add('hidden');
    $bar.style.width=Math.max(0,player.light)+'%';
    $timer.textContent=elapsed.toFixed(1);
    $level.textContent=(currentLevel+1)+' / '+LEVELS.length;
    $pip.classList.toggle('ready', player.cd<=0 && player.light>=DASH_COST);
  }

  // ---------- screens ----------
  const $title=document.getElementById('title');
  const $win=document.getElementById('win');
  const $hud=document.getElementById('hud');
  function start(){
    ensureAudio(); currentLevel=0; loadLevel(0);
    state='play'; startTime=performance.now(); elapsed=0;
    $title.classList.add('hidden'); $win.classList.add('hidden'); $hud.classList.remove('hidden');
    updateHud();
  }
  function win(){
    state='win'; finalTime=elapsed;
    document.getElementById('finalTime').textContent=finalTime.toFixed(1);
    $win.classList.remove('hidden'); $hud.classList.add('hidden'); sfxWin();
  }
  function restart(){ if (state==='play'||state==='win') start(); }
  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('againBtn').addEventListener('click', start);

  // ---------- input ----------
  addEventListener('keydown', (e)=>{
    const k=e.key.toLowerCase(); keys[k]=true;
    if (k===' '||k.startsWith('arrow')) e.preventDefault();
    if (k==='m') toggleMute();
    if (k==='r') restart();
    if (state==='title' && (k===' '||k==='enter')) start();
    else if (state==='win' && (k===' '||k==='enter')) start();
    else if (state==='play' && k===' ') dash();
  });
  addEventListener('keyup', (e)=>{ keys[e.key.toLowerCase()]=false; });

  function mapMouse(e){
    const r=canvas.getBoundingClientRect();
    mouseX=(e.clientX-r.left)/r.width*W;
    mouseY=(e.clientY-r.top)/r.height*H;
    hasMouse=true;
  }
  canvas.addEventListener('mousemove', mapMouse);
  canvas.addEventListener('mousedown', (e)=>{ e.preventDefault(); mapMouse(e); firing=true; });
  addEventListener('mouseup', ()=>{ firing=false; });
  canvas.addEventListener('mouseleave', ()=>{ firing=false; });

  // ---------- loop ----------
  function frame(now){
    let dt=(now-last)/1000; last=now;
    if (dt>0.05) dt=0.05;
    update(dt); render();
    requestAnimationFrame(frame);
  }

  // calm world behind the title
  loadLevel(0); state='title'; flash=0; bannerT=0;
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
